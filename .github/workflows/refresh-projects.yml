# 文件说明: 每天同步上游项目清单，重新生成静态数据并上传到 Cloudflare R2。
# 参考资料: https://docs.github.com/actions/using-workflows/events-that-trigger-workflows#schedule

name: Refresh project data

on:
  schedule:
    - cron: "0 20 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: refresh-project-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out atlas
        uses: actions/checkout@v5

      - name: Check out upstream data
        uses: actions/checkout@v5
        with:
          repository: 1c7/chinese-independent-developer
          ref: master
          path: source
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22.13.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate project snapshot
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SOURCE_REPO: ${{ github.workspace }}/source
          PROJECTS_OUTPUT_PATH: ${{ runner.temp }}/projects.json
        run: npm run data:generate

      - name: Verify site
        env:
          PROJECTS_SNAPSHOT_PATH: ${{ runner.temp }}/projects.json
        run: |
          npm run typecheck
          npm run lint
          npm test

      - name: Upload project snapshot to R2
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_EC2_METADATA_DISABLED: "true"
        run: |
          : "${CLOUDFLARE_ACCOUNT_ID:?CLOUDFLARE_ACCOUNT_ID secret is required}"
          : "${R2_BUCKET:?R2_BUCKET secret is required}"
          : "${AWS_ACCESS_KEY_ID:?R2_ACCESS_KEY_ID secret is required}"
          : "${AWS_SECRET_ACCESS_KEY:?R2_SECRET_ACCESS_KEY secret is required}"
          aws --version
          aws s3 cp "${{ runner.temp }}/projects.json" "s3://$R2_BUCKET/data/projects.json" \
            --endpoint-url "https://$CLOUDFLARE_ACCOUNT_ID.r2.cloudflarestorage.com" \
            --content-type "application/json; charset=utf-8" \
            --cache-control "public, max-age=300, stale-while-revalidate=86400"
