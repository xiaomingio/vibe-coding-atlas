<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>页面未找到｜Vibe Coding Atlas</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #17201c;
        --muted: #667069;
        --line: #dce2de;
        --paper: #fff;
        --wash: #f5f7f5;
        --green: #176b4d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        color: var(--ink);
        background: var(--paper);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        display: grid;
        place-items: center;
        padding: 32px;
      }

      main {
        width: min(100%, 520px);
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--wash);
        padding: 32px;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.7;
      }

      h1 {
        margin: 8px 0 14px;
        font-size: 32px;
        line-height: 1.15;
      }

      .eyebrow {
        color: var(--green);
        font-size: 12px;
        font-weight: 800;
        text-transform: uppercase;
      }

      a {
        color: var(--green);
        font-weight: 700;
        text-underline-offset: 3px;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Vibe Coding Atlas</p>
      <h1>页面未找到</h1>
      <p>这个地址没有对应内容。你可以返回 <a href="/">中国独立开发者项目目录</a> 继续浏览。</p>
    </main>
  </body>
</html>
